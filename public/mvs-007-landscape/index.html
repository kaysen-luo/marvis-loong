<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <meta name="robots" content="noindex,nofollow" />
  <title>MVS-007 LANDSCAPE PREVIEW v2 · Marvis Loong</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }
    /* Safe area CSS vars — game.js reads these via getComputedStyle */
    :root {
      --sa-top: env(safe-area-inset-top, 0px);
      --sa-right: env(safe-area-inset-right, 0px);
      --sa-bottom: env(safe-area-inset-bottom, 0px);
      --sa-left: env(safe-area-inset-left, 0px);
    }
    #game-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 300ms ease;
    }
    #game-container.ready { opacity: 1; }
    canvas { display: block; touch-action: none; }
    #loading {
      position: fixed; inset: 0;
      display: flex; justify-content: center; align-items: center;
      color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px; letter-spacing: 2px;
      z-index: 10;
    }
    /* Orientation lock overlay — 竖屏时显示 */
    #orient-lock {
      position: fixed; inset: 0;
      background: #000;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      color: #66ff99;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 40px;
      text-align: center;
    }
    #orient-lock.show { display: flex; }
    #orient-lock svg {
      width: 120px; height: 120px;
      margin-bottom: 32px;
      animation: rotate-hint 2s ease-in-out infinite;
    }
    #orient-lock .txt-main {
      font-size: 22px; font-weight: 700; letter-spacing: 2px;
      margin-bottom: 12px;
    }
    #orient-lock .txt-sub {
      font-size: 14px; color: #888; letter-spacing: 1px;
    }
    @keyframes rotate-hint {
      0%, 100% { transform: rotate(-90deg); }
      50% { transform: rotate(0deg); }
    }
    /* 竖屏检测:aspect-ratio < 1 = portrait */
    @media (orientation: portrait) {
      #orient-lock { display: flex; }
      #game-container { display: none; }
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="loading">LOADING...</div>
  <div id="orient-lock">
    <svg viewBox="0 0 64 64" fill="none" stroke="#66ff99" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="14" y="8" width="36" height="48" rx="4" />
      <line x1="26" y1="52" x2="38" y2="52" />
      <path d="M 8 32 Q 8 20 20 16" stroke="#66ff99" stroke-dasharray="2 3" />
      <polyline points="16,14 20,16 22,20" />
    </svg>
    <div class="txt-main">请横屏游玩</div>
    <div class="txt-sub">ROTATE YOUR DEVICE</div>
  </div>
  <script>
    // Try lock orientation (iOS silent fail — that's fine, CSS media query covers it)
    if (screen.orientation && typeof screen.orientation.lock === 'function') {
      screen.orientation.lock('landscape').catch(() => { /* iOS silent fail */ });
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  <script src="./game.js"></script>
  <script>
    // Fade-in canvas after 100ms
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('game-container').classList.add('ready');
      }, 100);
    });
  </script>
</body>
</html>
