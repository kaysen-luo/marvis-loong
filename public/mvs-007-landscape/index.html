<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <meta name="robots" content="noindex,nofollow" />
  <title>MVS-007 · 横屏灰度预览 v0.1.6-landscape</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
      /* safe-area: 让开灵动岛/home indicator */
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas { display: block; touch-action: none; }
    #loading {
      position: fixed; inset: 0;
      display: flex; justify-content: center; align-items: center;
      color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px; letter-spacing: 2px;
      z-index: 10;
    }
    /* 灰度标识 chip（左上角，避开灵动岛留 safe-area） */
    #preview-chip {
      position: fixed;
      top: calc(6px + env(safe-area-inset-top));
      left: calc(8px + env(safe-area-inset-left));
      z-index: 20;
      padding: 4px 10px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 11px;
      letter-spacing: 1px;
      color: #ffcc66;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,204,102,0.55);
      border-radius: 4px;
      pointer-events: none;
    }
    /* Orientation lock 遮罩：竖屏时全屏提示旋转手机 */
    #orientation-lock {
      display: none;
      position: fixed; inset: 0;
      z-index: 1000;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 24px;
      text-align: center;
      padding: 40px;
    }
    #orientation-lock .icon {
      font-size: 72px;
      animation: rot 2s ease-in-out infinite;
      transform-origin: center;
    }
    #orientation-lock .msg {
      font-size: 18px;
      letter-spacing: 2px;
    }
    #orientation-lock .sub {
      font-size: 12px;
      color: #888;
      letter-spacing: 1px;
    }
    @keyframes rot {
      0%,40% { transform: rotate(0deg); }
      60%,100% { transform: rotate(-90deg); }
    }
    @media (orientation: portrait) {
      #orientation-lock { display: flex; }
      #game-container { display: none; }
      #preview-chip { display: none; }
    }
    @media (orientation: landscape) {
      #orientation-lock { display: none; }
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="preview-chip">LANDSCAPE PREVIEW · 反馈请告知 K师</div>
  <div id="loading">LOADING...</div>
  <div id="orientation-lock">
    <div class="icon">📱</div>
    <div class="msg">请横屏游玩</div>
    <div class="sub">ROTATE YOUR DEVICE</div>
  </div>
  <script>
    // Screen Orientation API 尝试锁横屏（iOS Safari 大概率不支持，silent fail）
    try {
      if (screen.orientation && typeof screen.orientation.lock === 'function') {
        screen.orientation.lock('landscape').catch(function(){ /* silent */ });
      }
    } catch (e) { /* silent */ }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  <script src="./game.js"></script>
</body>
</html>
